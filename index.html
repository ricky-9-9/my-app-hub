<!DOCTYPE html>
<html>
<head>
  <title>My App Hub</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 150px);
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }

    .app {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .app:hover {
      background: #334155;
      transform: scale(1.05);
    }

    .screen {
      margin-top: 30px;
      padding: 20px;
    }
  </style>
</head>

<body>

<h1>📱 My App Hub</h1>
<p>Click an app below</p>

<div class="grid">
  <div class="app" onclick="openApp('calculator')">🧮 Calculator</div>
  <div class="app" onclick="openApp('notes')">📝 Notes</div>
  <div class="app" onclick="openApp('game')">🎮 Game</div>
  <div class="app" onclick="openApp('info')">ℹ️ Info</div>
</div>

<div class="screen" id="screen"></div>

<script>
function openApp(app) {
  let screen = document.getElementById("screen");

  if (app === "calculator") {
    screen.innerHTML = `
      <h2>Calculator</h2>
      <p>Example: 2 + 2 = 4</p>
    `;
  }

  if (app === "notes") {
    screen.innerHTML = `
      <h2>Notes</h2>
      <p>• Homework due Friday<br>• Study for test</p>
    `;
  }

  if (app === "game") {
    screen.innerHTML = `
      <h2>Click Game</h2>
      <button onclick="alert('You clicked!')">Click Me</button>
    `;
  }

  if (app === "info") {
    screen.innerHTML = `
      <h2>About This Site</h2>
      <p>This is my app hub project.</p>
    `;
  }
}
</script>

</body>
</html>
